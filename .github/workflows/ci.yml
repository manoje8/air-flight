name: Airflow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff black

      - name: Ruff lint
        run: ruff check dags/ plugins/

      - name: Black format check
        run: black --check dags/ plugins/

      - name: Validate DAG imports
        run: |
          python -c "
          import os, importlib.util, sys
          dag_dir = 'dags'
          for f in os.listdir(dag_dir):
              if f.endswith('.py'):
                  spec = importlib.util.spec_from_file_location(f, os.path.join(dag_dir, f))
                  mod = importlib.util.module_from_spec(spec)
                  spec.loader.exec_module(mod)
                  print(f'OK: {f}')
          "

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@localhost/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-airflow

      - name: Init Airflow DB
        run: airflow db migrate

      - name: Run tests
        run: pytest tests/ -v
